<!DOCTYPE html>
<html>
    <head>
<style>
  :root{
     --font-primary: "Playfair Display", "Merriweather", Georgia, serif;
  --font-body: "Inter", "Poppins", system-ui, sans-serif;
  --primary-text: #1f6f8b; 
  --accent-color: #2ec4b6;
  }
  body {
  line-height: 1.8rem;
  font-family: var(--font-body);
  background: var(--background-color);
  color: var(--secondary-text);
  font-size: 1rem;
  display: flex;
  justify-content: center; /* horizontal center */
  align-items: center;     /* vertical center */
  height: 100vh;
  margin: 0;
}

  .btn {
  border: 1px solid var(--accent-color);
  background-color: var(--accent-color);
  color: #fff;
  border-radius: .25rem;
 padding: .6rem 1rem;
  font-weight: 600;
  transition: all 0.3s ease;
  box-shadow: var(--shadow);
  width: 17rem;
}

.btn:hover {
  transform: translateY(-2px);
  background-color: #20b3a6;
}
   li{
 padding: .5rem;
 list-style-type: none;
  }
  h1 {

  letter-spacing: 0.3px;
   font-size: 2.2rem;
}

p {
  max-width: 600px;
  font-size: 1rem;
}

 #login_btn{
  background-color: blue;
  border-color: blue;}
 

</style>
    </head>
    <body>

     <div class="content">

        <h1>Log in</h1>
        
       
       
       
        <form action="" method="post" id="login">{%csrf_token%}
            {{form.as_ul}}
            <button type="submit"  class="btn" id="login_btn"> Log in </button>
        </form>

<p><a href="{%url 'password_change'%}">Forgot password?</p>
<a href="{%url 'signup'%}"><input type="submit"  class="btn" value="Sign up"></a>
    </div>

</body>
    
</html>
