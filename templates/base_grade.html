{%load static%}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="{% static 'css/crud.css' %}" rel="stylesheet">
       
    </head>
    <body>

        <nav class="navbar">
            <div class="header">
            <h1><a href="{%url 'login' %}">Points</a></h1>
            <div class="action-btn">
             {% if user.is_authenticated %}
    <li id="user">Hello {{ user.username }}</li>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button id="logout">Logout</button>
        </form>
    {% endif %}
    <button id="menu-btn">
                    
                    ☰
</button> 
</div>
</div>
        
       
    <ul class="nav-items">

    

        <span class="nav-title">Insert Grades</span>

      
            <li><a href="{% url 'create' %}">Grade 9</a></li>
            <li><a href="{% url 'create_ten' %}">Grade 10</a></li>
       


        <span class="nav-title">Mark List</span>

       
            <li><a href="{% url 'points' %}">Grade 9</a></li>
            <li><a href="{% url 'list_ten' %}">Grade 10</a></li>


</ul>

        </nav>
        <main class="container">
        {%block content%}
{%endblock%}  
</main>

    <script>
 const menuBtn = document.getElementById("menu-btn");
const navItems = document.querySelector(".nav-items");

menuBtn.addEventListener("click", () => {
    navItems.classList.toggle("active");
});
document.addEventListener('click', (event)=>{
    if(!menuBtn.contains(event.target) &&
    !navItems.contains(event.target)){
        navItems.classList.remove('active')
    }
})

        </script>
    </body>
</html>
